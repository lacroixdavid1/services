services:

  tailscale:
    image: tailscale/tailscale:latest
    container_name: ollama-tailscale
    hostname: ollama
    networks:
      - proxy
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY_OPENCLAW}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/ts-serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    volumes:
      - ${DATA_NVME_PATH}/ollama/tailscale/config:/config
      - ${DATA_NVME_PATH}/ollama/tailscale/state:/var/lib/tailscale
      - ./ts-serve.json:/ts-serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    pull_policy: always

  ollama-app:
    image: ollama/ollama:rocm
    container_name: ollama-app
    networks:
      - proxy
    restart: always
    pull_policy: always
    environment:
      - TZ=America/New_York
      - OLLAMA_HOST=0.0.0.0:11434
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    volumes:
      - ${DATA_NVME_PATH}/ollama/app:/root/.ollama/config
      - ${DATA_PATH}/ollama/models:/root/.ollama/models
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "44"   # video
      - "105"  # render
    depends_on:
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ollama-ui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ollama-ui
    networks:
      - proxy
    restart: always
    pull_policy: always
    environment:
      - TZ=America/New_York
      - OLLAMA_BASE_URL=http://ollama-app:11434
      - WEBUI_AUTH=false
    volumes:
      - ${DATA_NVME_PATH}/ollama/ui:/app/backend/data
    depends_on:
      tailscale:
        condition: service_healthy
      ollama-app:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: ollama-nginx
    networks:
      - proxy
      - uptime_kuma
    environment:
      - TZ=America/New_York
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      ollama-ui:
        condition: service_started
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    pull_policy: always

networks:
  proxy:
  uptime_kuma:
    external: true
