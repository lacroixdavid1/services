services:

  tailscale:
    image: tailscale/tailscale:latest
    container_name: calibre-web-tailscale
    hostname: calibre
    networks:
      - proxy
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/ts-serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    volumes:
      - ${DATA_NVME_PATH}/calibre-web/tailscale/config:/config
      - ${DATA_NVME_PATH}/calibre-web/tailscale/state:/var/lib/tailscale
      - ./ts-serve.json:/ts-serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    pull_policy: always

  application:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web-app
    networks:
      - proxy
      - media
      - caddy_proxy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ${DATA_NVME_PATH}/calibre-web/app:/config
      - ${DATA_PATH}/medias/books:/books
      - ${DATA_PATH}/medias/calibre:/calibre
    depends_on:
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8083"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    pull_policy: always

  nginx:
    image: nginx:alpine
    container_name: calibre-web-nginx
    networks:
      - proxy
      - uptime_kuma
    environment:
      - TZ=America/New_York
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      application:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    pull_policy: always

networks:
  proxy:
  media:
    external: true
  caddy_proxy:
    external: true
  uptime_kuma:
    external: true
