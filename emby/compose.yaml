services:

  tailscale:
    image: tailscale/tailscale:latest  
    container_name: emby-tailscale  
    hostname: emby
    networks:
      - proxy
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/ts-serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true  
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234 
    #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    volumes:
      - /mnt/data-nvme/services/emby/tailscale/config:/config 
      - /mnt/data-nvme/services/emby/tailscale/state:/var/lib/tailscale 
      - ./ts-serve.json:/ts-serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun 
    cap_add:
      - net_admin
      - sys_module   
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s 
      timeout: 10s 
      retries: 3 
      start_period: 10s 
    restart: always
    pull_policy: always

  application:
    image: lscr.io/linuxserver/emby:beta
    container_name: emby-app
    networks:
      proxy:
      caddy_proxy:
        aliases:
          - emby
      media:
    restart: always
    pull_policy: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /mnt/data-nvme/services/emby/app:/config
      - /mnt/data/medias/series:/data/tvshows
      - /mnt/data/medias/movies:/data/movies
      - /mnt/data/medias/events:/data/events
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "44"   # video
      - "105"  # render
    depends_on:
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "emby"] 
      interval: 30s 
      timeout: 10s
      retries: 3 
      start_period: 15s

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: emby-nginx
    networks:
      - proxy
      - uptime_kuma
    environment:
      - TZ=America/New_York
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      application:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    pull_policy: always

networks:
  proxy:
  caddy_proxy:
    name: caddy_proxy
    external: true
  media:
    external: true
  uptime_kuma:
    external: true
