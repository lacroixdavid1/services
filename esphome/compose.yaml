services:

  tailscale:
    image: tailscale/tailscale:latest  
    container_name: esphome-tailscale  
    hostname: esphome
    networks:
      - proxy
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/ts-serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true  
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234 
    #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    volumes:
      - ${DATA_NVME_PATH}/esphome/tailscale/config:/config 
      - ${DATA_NVME_PATH}/esphome/tailscale/state:/var/lib/tailscale 
      - ./ts-serve.json:/ts-serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun 
    cap_add:
      - net_admin
      - sys_module   
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s 
      timeout: 10s 
      retries: 3 
      start_period: 10s 
    restart: always
    pull_policy: always

  application:
    image: ghcr.io/esphome/esphome
    container_name: esphome-app
    restart: always
    networks:
      proxy:
      iot_vlan110:
        driver_opts:
          com.docker.network.endpoint.ifname: eth110
    pull_policy: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ${DATA_NVME_PATH}/esphome/config:/config
      - ${DATA_NVME_PATH}/esphome/data:/data/
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6052')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: esphome-nginx
    networks:
      - proxy
      - uptime_kuma
    environment:
      - TZ=America/New_York
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      application:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    pull_policy: always

networks:
  proxy:
  iot_vlan110:
    external: true
  uptime_kuma:
    external: true