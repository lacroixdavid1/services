services:

  tailscale:
    image: tailscale/tailscale:latest
    container_name: postgres-tailscale
    hostname: postgres
    networks:
      - uptime_kuma
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    volumes:
      - ${DATA_NVME_PATH}/postgres/tailscale/config:/config
      - ${DATA_NVME_PATH}/postgres/tailscale/state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    pull_policy: always

  postgres:
    image: postgres:latest
    container_name: postgres
    network_mode: "service:tailscale"
    restart: always
    pull_policy: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/New_York
    volumes:
      - ${DATA_NVME_PATH}/postgres/data:/var/lib/postgresql
    depends_on:
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  uptime_kuma:
    external: true
