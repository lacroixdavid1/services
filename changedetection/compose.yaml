# https://github.com/dgtlmoon/changedetection.io/blob/master/docker-compose.yml

services:



  tailscale:
    image: tailscale/tailscale:latest  
    container_name: changedetection-tailscale  
    hostname: changedetection
    networks:
      - proxy
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/ts-serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true  
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234 
    #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    volumes:
      - /mnt/data-nvme/services/changedetection/tailscale/config:/config 
      - /mnt/data-nvme/services/changedetection/tailscale/state:/var/lib/tailscale 
      - ./ts-serve.json:/ts-serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun 
    cap_add:
      - net_admin
      - sys_module 
  
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s 
      timeout: 10s 
      retries: 3 
      start_period: 10s 
    restart: always
    pull_policy: always







  # Sockpuppetbrowser is basically chrome wrapped in an API for allowing fast fetching of web-pages.
  # RECOMMENDED FOR FETCHING PAGES WITH CHROME, be sure to enable the "PLAYWRIGHT_DRIVER_URL" env variable in the main changedetection container
  browser-sockpuppet-chrome:
    hostname: browser-sockpuppet-chrome
    image: dgtlmoon/sockpuppetbrowser:latest
    networks:
      - chrome
    cap_add:
      - SYS_ADMIN
# SYS_ADMIN might be too much, but it can be needed on your platform https://github.com/puppeteer/puppeteer/blob/main/docs/troubleshooting.md#running-puppeteer-on-gitlabci
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1024
      - SCREEN_DEPTH=16
      - MAX_CONCURRENT_CHROME_PROCESSES=10


     # Used for fetching pages via Playwright+Chrome where you need Javascript support.
     # Note: Works well but is deprecated, does not fetch full page screenshots (doesnt work with Visual Selector)
     #       Does not report status codes (200, 404, 403) and other issues
#    browser-selenium-chrome:
#        hostname: browser-selenium-chrome
#        image: selenium/standalone-chrome:4
    # networks:
    #   - chrome
#        environment:
#            - VNC_NO_PASSWORD=1
#            - SCREEN_WIDTH=1920
#            - SCREEN_HEIGHT=1080
#            - SCREEN_DEPTH=24
#          CHROME_OPTIONS: |
#            --window-size=1280,1024
#            --headless
#            --disable-gpu
#        volumes:
#            # Workaround to avoid the browser crashing inside a docker container
#            # See https://github.com/SeleniumHQ/docker-selenium#quick-start
#            - /dev/shm:/dev/shm
#        restart: unless-stopped


  application:
    image: lscr.io/linuxserver/changedetection.io:latest
    container_name: changedetection-app
    networks:
      - proxy
      - chrome
    restart: always
    pull_policy: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - PLAYWRIGHT_DRIVER_URL=ws://browser-sockpuppet-chrome:3000
      # - WEBDRIVER_URL=http://browser-selenium-chrome:4444/wd/hub
    # - BASE_URL= #optional
    volumes:
      - /mnt/data-nvme/services/changedetection/app:/config
    depends_on:
      browser-sockpuppet-chrome:
        condition: service_started
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "changedetection"] 
      interval: 30s 
      timeout: 10s
      retries: 3 
      start_period: 15s

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: changedetection-nginx
    networks:
      - proxy
      - uptime_kuma
    environment:
      - TZ=America/New_York
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      application:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    pull_policy: always

networks:
  proxy:
  chrome:
  uptime_kuma:
    external: true
