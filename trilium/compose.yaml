services:

  tailscale:
    image: tailscale/tailscale:latest
    container_name: trilium-tailscale
    hostname: trilium
    networks:
      - proxy
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/ts-serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    volumes:
      - ${DATA_NVME_PATH}/trilium/tailscale/config:/config
      - ${DATA_NVME_PATH}/trilium/tailscale/state:/var/lib/tailscale
      - ./ts-serve.json:/ts-serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    pull_policy: always

  application:
    image: triliumnext/trilium
    container_name: trilium-app
    networks:
      - proxy
    restart: always
    pull_policy: always
    environment:
      - USER_UID=1000
      - PUID=1000
      - PGID=1000
      - TRILIUM_NETWORK_TRUSTEDREVERSEPROXY=100.64.0.0/10
      - USER_GID=1000
      - TZ=America/New_York
    volumes:
      - ${DATA_NVME_PATH}/trilium/app:/home/node/trilium-data
    depends_on:
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: trilium-nginx
    networks:
      - proxy
      - uptime_kuma
    environment:
      - TZ=America/New_York
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      application:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    pull_policy: always

networks:
  proxy:
  uptime_kuma:
    external: true
