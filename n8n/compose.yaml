services:

  tailscale:
    image: tailscale/tailscale:latest
    container_name: n8n-tailscale
    hostname: n8n
    networks:
      - proxy
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/ts-serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    volumes:
      - ${DATA_NVME_PATH}/n8n/tailscale/config:/config
      - ${DATA_NVME_PATH}/n8n/tailscale/state:/var/lib/tailscale
      - ./ts-serve.json:/ts-serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    pull_policy: always

  application:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n-app
    user: root
    networks:
      - proxy
    restart: always
    pull_policy: always
    environment:
      - TZ=America/New_York
      - N8N_HOST=n8n.${TS_TAILNET}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.${PUBLIC_DOMAIN}
      - N8N_TRUSTED_PROXIES=*
    volumes:
      - ${DATA_NVME_PATH}/n8n/app:/root/.n8n
    depends_on:
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: n8n-nginx
    networks:
      - proxy
      - uptime_kuma
      - caddy_proxy
    environment:
      - TZ=America/New_York
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      application:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    pull_policy: always

networks:
  proxy:
  uptime_kuma:
    external: true
  caddy_proxy:
    external: true
