services:

  tailscale:
    image: tailscale/tailscale:latest
    container_name: rabbitmq-tailscale
    hostname: rabbitmq
    networks:
      - uptime_kuma
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
    volumes:
      - ${DATA_NVME_PATH}/rabbitmq/tailscale/config:/config
      - ${DATA_NVME_PATH}/rabbitmq/tailscale/state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    pull_policy: always

  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    network_mode: "service:tailscale"
    restart: always
    pull_policy: always
    environment:
      - TZ=America/New_York
    depends_on:
      tailscale:
        condition: service_healthy

networks:
  uptime_kuma:
    external: true
