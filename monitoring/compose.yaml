# https://last9.io/blog/prometheus-with-docker-compose/

services:

  tailscale:
    image: tailscale/tailscale:latest  
    container_name: monitoring-tailscale  
    hostname: monitoring
    networks:
      - proxy
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY_OPENCLAW}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/ts-serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true  
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234 
    #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    volumes:
      - ${DATA_NVME_PATH}/monitoring/tailscale/config:/config 
      - ${DATA_NVME_PATH}/monitoring/tailscale/state:/var/lib/tailscale 
      - ./ts-serve.json:/ts-serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun 
    cap_add:
      - net_admin
      - sys_module 
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s 
      timeout: 10s 
      retries: 3 
      start_period: 10s 
    restart: always
    pull_policy: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - ${DATA_NVME_PATH}/monitoring/prometheus:/prometheus
      - ${DATA_NVME_PATH}/monitoring/prometheus/ha_token:/etc/prometheus/ha_token:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=3y'      # Adjust retention period
      - '--storage.tsdb.wal-compression'         # Compress write-ahead log
      - '--web.enable-lifecycle'                 # Enable runtime reloading
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s 
      timeout: 10s 
      retries: 3 
      start_period: 10s 
    networks:
      - monitoring
      - compose_monitoring
    restart: unless-stopped
    pull_policy: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    networks:
      - compose_monitoring
    restart: unless-stopped
    pull_policy: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - compose_monitoring
    restart: unless-stopped
    pull_policy: always

  loki:
    image: grafana/loki:latest
    container_name: loki
    user: root
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - ${DATA_NVME_PATH}/monitoring/loki:/loki
    environment:
      - TZ=America/New_York
    networks:
      - compose_monitoring
    restart: unless-stopped
    pull_policy: always

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    user: root
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_NVME_PATH}/monitoring/promtail:/var/promtail
    environment:
      - TZ=America/New_York
    networks:
      - compose_monitoring
    restart: unless-stopped
    pull_policy: always
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - GF_SERVER_ROOT_URL=https://monitoring.${TS_TAILNET}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,natel-discrete-panel,grafana-piechart-panel
    volumes:
      - ${DATA_NVME_PATH}/monitoring/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - compose_monitoring
      - proxy
    restart: unless-stopped
    pull_policy: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s 
      timeout: 10s 
      retries: 3 
      start_period: 10s 

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./alertmanager:/etc/alertmanager
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    networks:
      - compose_monitoring
    restart: unless-stopped
    pull_policy: always
      
  nginx:
    image: nginx:alpine
    container_name: monitoring-nginx
    networks:
      - proxy
      - uptime_kuma
    environment:
      - TZ=America/New_York
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      grafana:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    pull_policy: always

networks:
  proxy:
  compose_monitoring:
  monitoring:
    external: true
  uptime_kuma:
    external: true

