services:

  tailscale:
    image: tailscale/tailscale:latest  
    container_name: jdownloader-tailscale  
    hostname: jdownloader
    networks:
      - proxy
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/ts-serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true  
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234 
    #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    volumes:
      - /mnt/data-nvme/services/jdownloader/tailscale/config:/config 
      - /mnt/data-nvme/services/jdownloader/tailscale/state:/var/lib/tailscale 
      - ./ts-serve.json:/ts-serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun 
    cap_add:
      - net_admin
      - sys_module 
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s 
      timeout: 10s 
      retries: 3 
      start_period: 10s 
    restart: always
    pull_policy: always

  application:
    image: jlesage/jdownloader-2
    container_name: jdownloader-app
    networks:
      - proxy
    restart: always
    pull_policy: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    depends_on:
      tailscale:
        condition: service_healthy
    volumes:
      - /mnt/data-nvme/services/jdownloader/app:/config
      - /mnt/data/medias:/output
    healthcheck:
      test: ["CMD", "pgrep", "-f", "JDownloader"] 
      interval: 30s 
      timeout: 10s 
      retries: 3 
      start_period: 30s 

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: jdownloader-nginx
    networks:
      - proxy
      - uptime_kuma
    environment:
      - TZ=America/New_York
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      application:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    pull_policy: always

networks:
  proxy:
  uptime_kuma:
    external: true
