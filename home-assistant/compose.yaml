services:

  tailscale:
    image: tailscale/tailscale:latest  
    container_name: home-assistant-tailscale  
    hostname: home-assistant
    networks:
      - proxy
    environment:
      - TZ=America/New_York
      - TS_AUTHKEY=${TS_AUTHKEY_OPENCLAW}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/ts-serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true  
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234 
    #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    volumes:
      - ${DATA_NVME_PATH}/home-assistant/tailscale/config:/config 
      - ${DATA_NVME_PATH}/home-assistant/tailscale/state:/var/lib/tailscale 
      - ./ts-serve.json:/ts-serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun 
    cap_add:
      - net_admin
      - sys_module   
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 30s 
      timeout: 10s 
      retries: 3 
      start_period: 10s 
    restart: always
    pull_policy: always

  postgres:
    image: postgres:16-alpine
    container_name: home-assistant-postgres
    networks:
      - proxy
    environment:
      - POSTGRES_USER=${HA_POSTGRES_USER}
      - POSTGRES_PASSWORD=${HA_POSTGRES_PASSWORD}
      - POSTGRES_DB=homeassistant
      - TZ=America/New_York
    volumes:
      - ${DATA_NVME_PATH}/home-assistant/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hauser -d homeassistant"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    pull_policy: always

  application:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: home-assistant-app
    networks:
      proxy:
      monitoring:
      home_automation:
      cloudflare_tunnel:
      iot_vlan110:
        driver_opts:
          com.docker.network.endpoint.ifname: eth110
    restart: always
    pull_policy: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ${DATA_NVME_PATH}/home-assistant/app:/config
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      tailscale:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: home-assistant-nginx
    networks:
      - proxy
      - uptime_kuma
    environment:
      - TZ=America/New_York
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      application:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    pull_policy: always

networks:
  proxy:
  monitoring:
    external: true
  home_automation:
    external: true
  cloudflare_tunnel:
    external: true
  iot_vlan110:
    external: true
  uptime_kuma:
    external: true
